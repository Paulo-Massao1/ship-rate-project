workflows:
  ios-app-store:
    name: iOS App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - shiprate
      flutter: stable
      xcode: latest
    triggering:
      events: []
    scripts:
      - name: Disable Swift Package Manager
        script: flutter config --no-enable-swift-package-manager
      - name: Decode GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist
      - name: Verify GoogleService-Info.plist
        script: |
          PLIST="$CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist"
          test -f "$PLIST"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :BUNDLE_ID" "$PLIST")
          PROJECT_ID=$(/usr/libexec/PlistBuddy -c "Print :PROJECT_ID" "$PLIST")
          GOOGLE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print :GOOGLE_APP_ID" "$PLIST")
          if [ "$BUNDLE_ID" != "com.shiprate.app" ]; then
            echo "Invalid Firebase bundle id: $BUNDLE_ID"
            exit 1
          fi
          if [ "$PROJECT_ID" != "shiprate-daf18" ]; then
            echo "Invalid Firebase project id: $PROJECT_ID"
            exit 1
          fi
          echo "Firebase plist OK: bundle=$BUNDLE_ID project=$PROJECT_ID app=$GOOGLE_APP_ID"
      - name: Set up keychain
        script: keychain initialize
      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/$(uuidgen).mobileprovision)"
          echo ${CM_PROVISIONING_PROFILE} | tr -d ' \n' | base64 --decode > "$PROFILE_PATH"
          echo "Saved provisioning profile $PROFILE_PATH"
      - name: Set up signing certificate
        script: |
          echo $CM_CERTIFICATE | tr -d ' \n' | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Clean Flutter and iOS generated state
        script: |
          flutter clean
          cd ios
          pod deintegrate || true
          rm -rf Pods .symlinks
          rm -f Podfile.lock
          cd ..
      - name: Install Flutter dependencies
        script: flutter pub get
      - name: Print Firebase dependency versions
        script: |
          dart pub deps --style=list | grep -E "firebase_core|firebase_auth|cloud_firestore|cloud_functions|firebase_messaging|firebase_storage"
      - name: Generate launcher icons
        script: dart run flutter_launcher_icons
      - name: Generate native splash
        script: dart run flutter_native_splash:create
      - name: Fix LaunchScreen for iPad
        script: |
          STORYBOARD="$CM_BUILD_DIR/ios/Runner/Base.lproj/LaunchScreen.storyboard"
          sed -i '' 's/useAutolayout="YES"/useAutolayout="YES" useTraitCollections="YES" useSafeAreas="YES"/' "$STORYBOARD"
          if ! grep -q "safeArea" "$STORYBOARD"; then
            sed -i '' 's|</view>|<viewLayoutGuide key="safeArea" id="Bcu-3y-fUS"/></view>|' "$STORYBOARD"
          fi
          echo "Patched LaunchScreen.storyboard for iPad compatibility"
          cat "$STORYBOARD"
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Verify iOS Firebase plugin registration
        script: |
          REGISTRANT="$CM_BUILD_DIR/ios/Runner/GeneratedPluginRegistrant.m"
          WORKSPACE="$CM_BUILD_DIR/ios/Runner.xcworkspace/contents.xcworkspacedata"
          test -f "$REGISTRANT"
          test -f "$WORKSPACE"
          grep -q "FLTFirebaseCorePlugin" "$REGISTRANT"
          grep -q "Pods.xcodeproj" "$WORKSPACE"
          grep -q "firebase_core" "$CM_BUILD_DIR/ios/Podfile.lock"
          grep -q "firebase_core" "$CM_BUILD_DIR/ios/Pods/Manifest.lock"
          echo "iOS Firebase plugin registration OK"
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=$CM_BUILD_DIR/ios/ExportOptions.plist
      - name: Verify final iOS archive Firebase channel
        script: |
          APP="$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          test -d "$APP"
          if ! grep -R -a -q "FirebaseCoreHostApi" "$APP"; then
            echo "FirebaseCoreHostApi channel not found in final app bundle"
            exit 1
          fi
          echo "Final iOS archive contains FirebaseCoreHostApi channel"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
