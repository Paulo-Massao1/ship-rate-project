name: ship_rate
description: "ShipRate - Ship evaluation and navigation safety"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.14.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.9
  cloud_functions: ^5.2.6
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.8
  firebase_storage_web: ^3.10.15

  # Image picker
  image_picker: ^1.1.2
  url_launcher: ^6.3.2

  # Local storage (web + mobile)
  shared_preferences: ^2.2.2
  
  # Web / PWA utilities (cross-platform)
  universal_html: ^2.2.4

  # PDF generation and export (mobile + web)
  pdf: ^3.11.1
  printing: ^5.13.2
  
  # Excel parsing
  excel: ^4.0.6

  # Date formatting
  intl: ^0.20.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/navio.jpg
    - assets/images/navio2.png
    - assets/images/navio3.jpg

flutter_launcher_icons:
  ios: true
  web:
    generate: false
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0A1628"
  image: "assets/icon/app_icon.png"
  ios: true
  web: false
  ios_content_mode: scaleAspectFit
