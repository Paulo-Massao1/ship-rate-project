<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShipRate - Redefinir Senha</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #0a1628, #0d2137);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 32px;
      color: #64b5f6;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(100,181,246,0.1);
      border-radius: 16px;
      padding: 36px 28px;
      width: 100%;
      max-width: 420px;
    }

    .card h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }

    .card p.subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      margin-bottom: 28px;
    }

    .field { position: relative; margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 1px solid rgba(100,181,246,0.2);
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: #64b5f6; }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 34px;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-size: 18px;
      line-height: 1;
      padding: 4px;
    }

    .toggle-pw:hover { color: #64b5f6; }

    .error-msg {
      background: rgba(239,83,80,0.12);
      border: 1px solid rgba(239,83,80,0.3);
      color: #ef9a9a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #1565c0, #1976d2);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .success-box {
      text-align: center;
    }

    .success-box .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .success-box h2 { margin-bottom: 12px; }

    .success-box p {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 24px;
    }

    .link {
      color: #64b5f6;
      text-decoration: none;
      font-weight: 500;
    }

    .link:hover { text-decoration: underline; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">ShipRate</div>
  <div class="card" id="card"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCFFFbTHNPMA9t1ABrC_uk92ym8SEKSSHI",
      authDomain: "shiprate-daf18.firebaseapp.com",
      projectId: "shiprate-daf18",
      storageBucket: "shiprate-daf18.firebasestorage.app",
      messagingSenderId: "718297005782",
      appId: "1:718297005782:web:1a2e4f254323a13c685377",
      measurementId: "G-ZP68WL1MM3"
    });

    var params = new URLSearchParams(window.location.search);
    var mode = params.get("mode");
    var oobCode = params.get("oobCode");
    var card = document.getElementById("card");

    function showInvalid() {
      card.innerHTML =
        '<div class="success-box">' +
          '<div class="icon">&#9888;&#65039;</div>' +
          '<h2>Link inválido</h2>' +
          '<p>Este link de redefinição de senha é inválido ou expirou.</p>' +
          '<a class="link" href="https://shiprate-daf18.web.app/">Voltar ao ShipRate</a>' +
        '</div>';
    }

    function friendlyError(code) {
      switch (code) {
        case "auth/expired-action-code":
          return "Este link expirou. Solicite uma nova redefinição de senha.";
        case "auth/invalid-action-code":
          return "Este link é inválido ou já foi utilizado.";
        case "auth/weak-password":
          return "A senha é muito fraca. Use pelo menos 6 caracteres.";
        default:
          return "Ocorreu um erro. Tente novamente mais tarde.";
      }
    }

    if (mode !== "resetPassword" || !oobCode) {
      showInvalid();
    } else {
      card.innerHTML =
        '<h2>Redefinir Senha</h2>' +
        '<p class="subtitle">Digite sua nova senha abaixo</p>' +
        '<div id="errorBox" class="error-msg"></div>' +
        '<form id="resetForm">' +
          '<div class="field">' +
            '<label for="pw1">Nova senha</label>' +
            '<input type="password" id="pw1" autocomplete="new-password" required minlength="6">' +
            '<button type="button" class="toggle-pw" data-target="pw1" aria-label="Mostrar senha">&#128065;</button>' +
          '</div>' +
          '<div class="field">' +
            '<label for="pw2">Confirmar senha</label>' +
            '<input type="password" id="pw2" autocomplete="new-password" required minlength="6">' +
            '<button type="button" class="toggle-pw" data-target="pw2" aria-label="Mostrar senha">&#128065;</button>' +
          '</div>' +
          '<button type="submit" class="btn" id="submitBtn">Redefinir senha</button>' +
        '</form>';

      document.querySelectorAll(".toggle-pw").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var input = document.getElementById(btn.dataset.target);
          var isPw = input.type === "password";
          input.type = isPw ? "text" : "password";
          btn.innerHTML = isPw ? "&#128064;" : "&#128065;";
        });
      });

      document.getElementById("resetForm").addEventListener("submit", function(e) {
        e.preventDefault();
        var pw1 = document.getElementById("pw1").value;
        var pw2 = document.getElementById("pw2").value;
        var errBox = document.getElementById("errorBox");
        var submitBtn = document.getElementById("submitBtn");

        errBox.style.display = "none";

        if (pw1.length < 6) {
          errBox.textContent = "A senha deve ter pelo menos 6 caracteres.";
          errBox.style.display = "block";
          return;
        }

        if (pw1 !== pw2) {
          errBox.textContent = "As senhas não coincidem.";
          errBox.style.display = "block";
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span>Redefinindo...';

        firebase.auth().confirmPasswordReset(oobCode, pw1)
          .then(function() {
            card.innerHTML =
              '<div class="success-box">' +
                '<div class="icon">&#9989;</div>' +
                '<h2>Senha redefinida!</h2>' +
                '<p>Sua senha foi alterada com sucesso. Você já pode fazer login com a nova senha.</p>' +
                '<a class="btn" href="https://shiprate-daf18.web.app/" style="display:inline-block;text-decoration:none;text-align:center;">Abrir ShipRate</a>' +
              '</div>';
          })
          .catch(function(error) {
            submitBtn.disabled = false;
            submitBtn.textContent = "Redefinir senha";
            errBox.textContent = friendlyError(error.code);
            errBox.style.display = "block";
          });
      });
    }
  </script>
</body>
</html>
